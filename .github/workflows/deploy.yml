name: Deploy Budget App to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate app icons
        run: python3 scripts/gen-icons.py
        working-directory: budget-app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: budget-app

      - name: Build app
        run: npm run build
        working-directory: budget-app

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: budget-app/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
